name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC
    # Cron format: minute hour day-of-month month day-of-week
    - cron: '0 8 */5 * *'

  # Allows you to run this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Wake up Supabase
        run: |
          response=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/waitlist?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Response code: $response"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase is awake and responding."
          else
            echo "❌ Unexpected response: $response"
            exit 1
          fi