<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Viewport: prevent zoom on input tap, fill the full screen -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Status bar + URL bar color (Android Chrome & Safari) -->
  <meta name="theme-color" content="#0a0a0a" />

  <!-- iPhone home screen: opens as full-screen app, no Safari toolbar -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- ── SEO: Open Graph (WhatsApp / chat link previews) ── -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Nomada — The first Latino party with open bar 🔥" />
  <meta property="og:description" content="Only 300 spots. Something exclusive is happening in Spring 2026. Get on the list first." />
  <meta property="og:image"       content="https://nomada-waitlist.pages.dev/images/og-preview.jpg" />
  <meta property="og:url"         content="https://nomada-waitlist.pages.dev/" />
  <meta property="og:site_name"   content="Nomada" />

  <title>Nomada — Something is coming</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- Background ambient orbs (CSS-only animation) -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <!-- ── Language Switcher ────────────────────── -->
  <div class="lang-switcher" role="navigation" aria-label="Language selector">
    <button
      id="lang-btn"
      class="lang-btn"
      aria-haspopup="listbox"
      aria-expanded="false"
      aria-controls="lang-dropdown"
    >
      <span id="lang-btn-label">EN</span>
      <span class="lang-btn-arrow" aria-hidden="true">▾</span>
    </button>

    <div
      id="lang-dropdown"
      class="lang-dropdown"
      role="listbox"
      aria-label="Choose language"
    >
      <button class="lang-option is-active" data-lang="en" role="option">
        <span class="lang-flag">🇺🇸</span> English
      </button>
      <button class="lang-option" data-lang="es" role="option">
        <span class="lang-flag">🇨🇴</span> Español
      </button>
      <button class="lang-option" data-lang="pt" role="option">
        <span class="lang-flag">🇧🇷</span> Português
      </button>
    </div>
  </div>

  <!-- ── Main page wrapper ────────────────────── -->
  <main class="page">
    <div class="content">

      <!-- Tagline -->
      <p class="tagline" data-i18n="tagline">The first Latino party with open bar</p>

      <!-- Logo -->
      <div class="logo-wrap">
        <img
          src="/images/nomada-logo.png"
          alt="Nomada"
          class="logo"
          width="220"
          height="80"
          loading="eager"
        />
      </div>

      <!-- Headline -->
      <h1 class="headline" data-i18n="headline">
        Something different is coming to Toronto.
      </h1>

      <!-- Season -->
      <p class="season" data-i18n="season">Spring · 2026</p>

      <!-- Scarcity lines -->
      <div class="scarcity-block">
        <p class="scarcity" data-i18n="scarcity">Limited · Subject to availability</p>
        <p class="spots" data-i18n="spots">300 spots</p>
      </div>

      <!-- ── Waitlist Box ────────────────────── -->
      <div class="waitlist-box" role="region" aria-label="Join waitlist">

        <h2 class="waitlist-title" data-i18n="joinWaitlist">I Want My Spot</h2>

        <!-- Email input -->
        <div class="input-group">
          <label class="input-label" for="email-input" data-i18n="joinWithEmail">With email</label>
          <input
            id="email-input"
            class="input-field"
            type="text"
            inputmode="email"
            autocomplete="email"
            placeholder="your@email.com"
            data-placeholder-i18n="emailPlaceholder"
            aria-describedby="email-ghost email-error"
          />
          <span id="email-ghost" class="input-ghost" aria-live="polite"></span>
          <span id="email-error" class="input-error" role="alert" aria-live="assertive"></span>
        </div>

        <!-- Or divider -->
        <div class="or-divider">
          <span data-i18n="or">or</span>
        </div>

        <!-- Instagram input -->
        <div class="input-group">
          <label class="input-label" for="insta-input" data-i18n="instagramAccount">With Instagram</label>
          <input
            id="insta-input"
            class="input-field"
            type="text"
            inputmode="text"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            placeholder="@yourusername"
            data-placeholder-i18n="instagramPlaceholder"
            aria-describedby="insta-ghost insta-error"
          />
          <span id="insta-ghost" class="input-ghost" aria-live="polite"></span>
          <span id="insta-error" class="input-error" role="alert" aria-live="assertive"></span>
        </div>

      </div>
      <!-- /waitlist-box -->

      <!-- Submit button — outside the box -->
      <button id="submit-btn" class="submit-btn" data-i18n="submitButton">
        Join The Waitlist
      </button>

    </div>
    <!-- /content -->

    <!-- ── Footer ─────────────────────────────── -->
    <footer class="site-footer">
      <p data-i18n="footer">© 2026 Nomada. Something is coming.</p>
    </footer>

  </main>

  <!-- ── Success Modal ──────────────────────── -->
  <div
    id="modal-overlay"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <div class="modal">
      <h2 id="modal-title" class="modal-title"></h2>
      <div class="modal-title-fire">
        <svg width="32" height="38" viewBox="0 0 32 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="flame-gradient" x1="0" y1="38" x2="32" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ff6b35"/>
              <stop offset="50%" stop-color="#ff0080"/>
              <stop offset="100%" stop-color="#ff6b35"/>
            </linearGradient>
          </defs>
          <path d="M16 2C16 2 20 8 18 13C22 10 24 5 24 5C24 5 30 12 28 20C26 28 20 32 16 36C12 32 6 28 4 20C2 12 8 5 8 5C8 5 10 10 14 13C12 8 16 2 16 2Z" fill="url(#flame-gradient)"/>
        </svg>
      </div>
      <div class="modal-confirm-group">
        <p id="modal-line1" class="modal-line modal-line--confirm"></p>
        <p id="modal-line2" class="modal-line modal-line--link"></p>
      </div>
      <div class="modal-pair-group">
        <p id="modal-line3" class="modal-line modal-line--pair"></p>
        <p id="modal-line5" class="modal-line modal-line--closing"></p>
      </div>
      <button id="modal-close-btn" class="modal-close-btn"></button>
    </div>
  </div>

  <!-- Entry point — type="module" enables ES6 imports -->
  <script type="module" src="/js/main.js"></script>

</body>
</html>
